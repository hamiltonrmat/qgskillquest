<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="pageGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fd"/>
      <stop offset="100%" style="stop-color:#c8dff0"/>
    </linearGradient>
    <linearGradient id="sparkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f7c948"/>
      <stop offset="100%" style="stop-color:#f0a500"/>
    </linearGradient>
    <linearGradient id="clipGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="checkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <circle cx="50" cy="50" r="48" fill="url(#bgGrad)"/>
  <circle cx="50" cy="50" r="48" fill="none" stroke="#2563eb" stroke-width="0.8" opacity="0.5"/>
  <g filter="url(#softShadow)">
    <rect x="22" y="26" width="50" height="58" rx="3" fill="url(#pageGrad)"/>
    <rect x="22" y="26" width="3" height="58" rx="3" fill="#b0c8e0" opacity="0.5"/>
    <rect x="22" y="26" width="50" height="7" rx="3" fill="url(#clipGrad)"/>
    <rect x="38" y="20" width="18" height="12" rx="3" fill="url(#clipGrad)"/>
    <rect x="41" y="23" width="12" height="6" rx="1.5" fill="#1a1a2e" opacity="0.4"/>
  </g>
  <circle cx="32" cy="42" r="3.5" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="39" y1="42" x2="63" y2="42" stroke="#94a3b8" stroke-width="1.8" stroke-linecap="round"/>
  <rect x="28.5" y="49.5" width="7" height="7" rx="1.5" fill="url(#checkGrad)"/>
  <polyline points="30,53 32,55.5 35,51" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="39" y1="53" x2="63" y2="53" stroke="#94a3b8" stroke-width="1.8" stroke-linecap="round"/>
  <rect x="28.5" y="59.5" width="7" height="7" rx="1.5" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="39" y1="63" x2="55" y2="63" stroke="#94a3b8" stroke-width="1.8" stroke-linecap="round"/>
  <g filter="url(#glow)" transform="translate(62, 66)">
    <circle cx="0" cy="0" r="2.5" fill="url(#sparkGrad)"/>
    <line x1="0" y1="-5.5" x2="0" y2="-10" stroke="#f7c948" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="5.5" x2="0" y2="10" stroke="#f7c948" stroke-width="2" stroke-linecap="round"/>
    <line x1="-5.5" y1="0" x2="-10" y2="0" stroke="#f7c948" stroke-width="2" stroke-linecap="round"/>
    <line x1="5.5" y1="0" x2="10" y2="0" stroke="#f7c948" stroke-width="2" stroke-linecap="round"/>
    <line x1="-3.5" y1="-3.5" x2="-6" y2="-6" stroke="#f0a500" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="3.5" y1="-3.5" x2="6" y2="-6" stroke="#f0a500" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="-3.5" y1="3.5" x2="-6" y2="6" stroke="#f0a500" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="3.5" y1="3.5" x2="6" y2="6" stroke="#f0a500" stroke-width="1.2" stroke-linecap="round"/>
  </g>
  <circle cx="62" cy="66" r="13" fill="none" stroke="#f7c948" stroke-width="0.5" opacity="0.25" stroke-dasharray="3 3"/>
</svg>
