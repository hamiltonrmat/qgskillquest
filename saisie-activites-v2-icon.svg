    <polyline points="34,33 50,24 66,33" fill="none" stroke="white" stroke-width="0.8" opacity="0.3"/>
  </g>
  <g filter="url(#blockShadow)">
    <polygon points="50,14 62,21 50,28 38,21" fill="url(#block3Top)"/>
    <polygon points="38,21 50,28 50,38 38,31" fill="url(#block3Left)"/>
    <polygon points="62,21 50,28 50,38 62,31" fill="url(#block3Right)"/>
    <polygon points="50,14 62,21 50,28 38,21" fill="white" opacity="0.08"/>
    <polyline points="38,21 50,14 62,21" fill="none" stroke="white" stroke-width="0.8" opacity="0.4"/>
  </g>
  <line x1="43" y1="47" x2="57" y2="47" stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <line x1="43" y1="33" x2="57" y2="33" stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <line x1="45" y1="21" x2="55" y2="21" stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <g filter="url(#outerGlow)" transform="translate(72, 62) rotate(-15)">
    <rect x="-3" y="-20" width="6" height="4" rx="1.5" fill="#f9a8d4"/>
    <rect x="-3" y="-17" width="6" height="1.2" fill="#9ca3af"/>
    <rect x="-3" y="-16" width="6" height="18" rx="1" fill="url(#pencilBody)"/>
    <rect x="1.5" y="-16" width="1.5" height="18" fill="url(#pencilDark)" opacity="0.5"/>
    <rect x="-3" y="2" width="6" height="4" fill="#c4863a"/>
    <polygon points="-3,6 3,6 0,13" fill="#f1f5f9"/>
    <polygon points="-1,10 1,10 0,13" fill="#374151"/>
    <line x1="-1.2" y1="-15" x2="-1.2" y2="2" stroke="white" stroke-width="0.8" opacity="0.35" stroke-linecap="round"/>
  </g>
  <g filter="url(#outerGlow)">
    <circle cx="24" cy="76" r="10" fill="url(#plusGrad)"/>
    <circle cx="24" cy="76" r="10" fill="none" stroke="white" stroke-width="0.6" opacity="0.3"/>
    <line x1="24" y1="71" x2="24" y2="81" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="19" y1="76" x2="29" y2="76" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  </g>
</svg>
