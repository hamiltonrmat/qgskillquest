  <circle cx="50" cy="50" r="48" fill="url(#bgGrad)"/>
  <circle cx="50" cy="50" r="48" fill="none" stroke="#1e40af" stroke-width="0.5" opacity="0.3"/>
  <line x1="10" y1="50" x2="90" y2="50" stroke="#1e3a8a" stroke-width="0.4" opacity="0.3"/>
  <line x1="50" y1="10" x2="50" y2="90" stroke="#1e3a8a" stroke-width="0.4" opacity="0.3"/>
  <g filter="url(#blockShadow)">
    <polygon points="50,38 66,47 50,56 34,47" fill="url(#blockTop)"/>
    <polygon points="34,47 50,56 50,72 34,63" fill="url(#blockLeft)"/>
    <polygon points="66,47 50,56 50,72 66,63" fill="url(#blockRight)"/>
    <polygon points="50,38 66,47 50,56 34,47" fill="white" opacity="0.06"/>
    <polyline points="34,47 50,38 66,47" fill="none" stroke="white" stroke-width="0.8" opacity="0.3"/>
  </g>
  <g filter="url(#blockShadow)">
