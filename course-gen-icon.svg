<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="bookGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fd"/>
      <stop offset="100%" style="stop-color:#c8dff0"/>
    </linearGradient>
    <linearGradient id="sparkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f7c948"/>
      <stop offset="100%" style="stop-color:#f0a500"/>
    </linearGradient>
    <linearGradient id="spineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <circle cx="50" cy="50" r="48" fill="url(#bgGrad)"/>
  <circle cx="50" cy="50" r="48" fill="none" stroke="#2563eb" stroke-width="0.8" opacity="0.5"/>
  <g filter="url(#softShadow)">
    <rect x="24" y="22" width="8" height="54" rx="2" fill="url(#spineGrad)"/>
    <rect x="30" y="22" width="44" height="54" rx="2" fill="url(#bookGrad)"/>
    <rect x="30" y="22" width="3" height="54" fill="#b0c8e0" opacity="0.6"/>
  </g>
  <line x1="37" y1="34" x2="66" y2="34" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
  <line x1="37" y1="40" x2="66" y2="40" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
  <line x1="37" y1="46" x2="58" y2="46" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
  <line x1="37" y1="55" x2="50" y2="55" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="37" y1="60" x2="46" y2="60" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <g filter="url(#glow)" transform="translate(58, 53)">
    <circle cx="0" cy="0" r="2.5" fill="url(#sparkGrad)"/>
    <line x1="0" y1="-5.5" x2="0" y2="-10" stroke="#f7c948" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="5.5" x2="0" y2="10" stroke="#f7c948" stroke-width="2" stroke-linecap="round"/>
    <line x1="-5.5" y1="0" x2="-10" y2="0" stroke="#f7c948" stroke-width="2" stroke-linecap="round"/>
    <line x1="5.5" y1="0" x2="10" y2="0" stroke="#f7c948" stroke-width="2" stroke-linecap="round"/>
    <line x1="-3.5" y1="-3.5" x2="-6" y2="-6" stroke="#f0a500" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="3.5" y1="-3.5" x2="6" y2="-6" stroke="#f0a500" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="-3.5" y1="3.5" x2="-6" y2="6" stroke="#f0a500" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="3.5" y1="3.5" x2="6" y2="6" stroke="#f0a500" stroke-width="1.2" stroke-linecap="round"/>
  </g>
  <circle cx="58" cy="53" r="13" fill="none" stroke="#f7c948" stroke-width="0.5" opacity="0.25" stroke-dasharray="3 3"/>
</svg>
